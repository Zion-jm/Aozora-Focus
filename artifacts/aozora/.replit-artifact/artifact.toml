kind = "mobile"
previewPath = "/"
title = "Aozora"
version = "1.0.0"
id = "artifacts/aozora"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20823

[services.development]
run = "fuser -k 20823/tcp 2>/dev/null; sleep 1; pnpm --filter @workspace/aozora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aozora", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aozora", "run", "serve" ]

[services.env]
PORT = "20823"
BASE_PATH = "/"
