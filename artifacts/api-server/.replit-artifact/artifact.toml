kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
# If port 8080 is already owned by Aozora Admin Website (start.sh), attach to it
# rather than fighting for the port. If it's free, start the server normally.
run = "bash -c 'if fuser 8080/tcp 2>/dev/null; then echo \"[api-server] Port 8080 in use — attaching to existing server\"; until curl -sf http://localhost:8080/api/healthz >/dev/null 2>&1; do sleep 1; done; echo \"[api-server] Health check passed — server is live on :8080\"; tail -f /dev/null; else pnpm --filter @workspace/api-server run dev; fi'"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
